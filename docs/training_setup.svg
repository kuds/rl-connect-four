<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#264653"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6a4c93"/>
    </marker>
    <linearGradient id="boardGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e9f5f3"/>
      <stop offset="1" stop-color="#cfe8e3"/>
    </linearGradient>
  </defs>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1d3557">
    Connect Four Self-Play Training Setup
  </text>
  <text x="500" y="50" text-anchor="middle" font-size="13" fill="#555">
    PPO + RLlib league-based self-play on OpenSpiel
  </text>

  <!-- === Environment block (top-left) === -->
  <rect x="40" y="80" width="280" height="160" rx="10" fill="url(#boardGrad)" stroke="#2a9d8f" stroke-width="2"/>
  <text x="180" y="105" text-anchor="middle" font-weight="700" fill="#1d3557">OpenSpiel Environment</text>
  <text x="180" y="125" text-anchor="middle" fill="#264653">connect_four (registered as "open_spiel_env")</text>
  <text x="180" y="148" text-anchor="middle" fill="#264653">2 agents · Discrete(7) actions</text>
  <text x="180" y="166" text-anchor="middle" fill="#264653">info_state observation · legal-action mask</text>
  <text x="180" y="195" text-anchor="middle" font-style="italic" fill="#555">num_env_runners = 2</text>
  <text x="180" y="213" text-anchor="middle" font-style="italic" fill="#555">policy_mapping_fn assigns p0/p1</text>
  <text x="180" y="231" text-anchor="middle" font-style="italic" fill="#555">randomly across episodes</text>

  <!-- === Policy map block (top-right) === -->
  <rect x="380" y="80" width="280" height="200" rx="10" fill="#fef6ec" stroke="#e76f51" stroke-width="2"/>
  <text x="520" y="105" text-anchor="middle" font-weight="700" fill="#1d3557">Policy / Module Map</text>

  <rect x="400" y="120" width="240" height="34" rx="6" fill="#ffffff" stroke="#2a9d8f"/>
  <text x="520" y="142" text-anchor="middle" fill="#1d3557"><tspan font-weight="700">main</tspan> · PPO · trainable</text>

  <rect x="400" y="162" width="240" height="34" rx="6" fill="#ffffff" stroke="#999"/>
  <text x="520" y="184" text-anchor="middle" fill="#555"><tspan font-weight="700">random</tspan> · RandomRLModule · frozen</text>

  <rect x="400" y="204" width="240" height="34" rx="6" fill="#ffffff" stroke="#6a4c93" stroke-dasharray="4 3"/>
  <text x="520" y="226" text-anchor="middle" fill="#6a4c93">
    <tspan font-weight="700">main_v0, main_v1, ...</tspan> · frozen snapshots
  </text>

  <text x="520" y="262" text-anchor="middle" font-style="italic" fill="#555">policies_to_train = ["main"]</text>

  <!-- === Self-play callback (right side) === -->
  <rect x="720" y="80" width="240" height="200" rx="10" fill="#f3edff" stroke="#6a4c93" stroke-width="2"/>
  <text x="840" y="105" text-anchor="middle" font-weight="700" fill="#1d3557">SelfPlayCallback</text>
  <text x="840" y="128" text-anchor="middle" fill="#264653">After every iteration:</text>
  <text x="840" y="148" text-anchor="middle" fill="#264653">if win_rate &gt; 0.95 ⇒</text>
  <text x="840" y="166" text-anchor="middle" fill="#264653">  • snapshot main → main_v{N}</text>
  <text x="840" y="184" text-anchor="middle" fill="#264653">  • freeze it · add to league</text>
  <text x="840" y="202" text-anchor="middle" fill="#264653">  • route some episodes to it</text>
  <text x="840" y="230" text-anchor="middle" font-style="italic" fill="#555">stop when league_size ≥ 3</text>
  <text x="840" y="248" text-anchor="middle" font-style="italic" fill="#555">or training_iters ≥ 100</text>
  <text x="840" y="266" text-anchor="middle" font-style="italic" fill="#555">or env_steps ≥ 2M</text>

  <!-- Arrows: env <-> policy map === -->
  <path d="M320,160 L380,160" stroke="#264653" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="350" y="153" text-anchor="middle" font-size="11" fill="#264653">obs</text>

  <path d="M380,195 L320,195" stroke="#264653" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="350" y="210" text-anchor="middle" font-size="11" fill="#264653">action</text>

  <!-- Callback monitors policy map -->
  <path d="M720,180 L660,180" stroke="#6a4c93" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arrowDashed)"/>
  <text x="690" y="172" text-anchor="middle" font-size="11" fill="#6a4c93">snapshot</text>

  <!-- === Learner block (middle) === -->
  <rect x="280" y="320" width="440" height="120" rx="10" fill="#fef0eb" stroke="#e76f51" stroke-width="2"/>
  <text x="500" y="345" text-anchor="middle" font-weight="700" fill="#1d3557">PPO Learner (1 GPU)</text>
  <text x="500" y="367" text-anchor="middle" fill="#264653">MLP [512, 512] · num_epochs = 20</text>
  <text x="500" y="385" text-anchor="middle" fill="#264653">updates "main" only · uses rollouts from all opponents</text>
  <text x="500" y="408" text-anchor="middle" fill="#555" font-style="italic">
    logs: policy_loss · vf_loss · entropy · kl
  </text>
  <text x="500" y="426" text-anchor="middle" fill="#555" font-style="italic">
    env_runner metrics: win_rate · episode_return_mean
  </text>

  <!-- Arrow env-runner → learner -->
  <path d="M180,240 L180,380 L280,380" stroke="#264653" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="200" y="305" font-size="11" fill="#264653">rollouts</text>

  <!-- Arrow learner → main weights -->
  <path d="M520,320 L520,154" stroke="#264653" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="550" y="245" font-size="11" fill="#264653">updated weights</text>

  <!-- === Artifacts block (bottom) === -->
  <rect x="40" y="490" width="920" height="120" rx="10" fill="#eef2f7" stroke="#264653" stroke-width="2"/>
  <text x="500" y="513" text-anchor="middle" font-weight="700" fill="#1d3557">Post-training artifacts → $ARTIFACT_DIR</text>

  <g font-size="12" fill="#264653">
    <text x="80"  y="540">checkpoint/</text>
    <text x="80"  y="558" fill="#555" font-style="italic">final algo + every league snapshot</text>

    <text x="280" y="540">learning_curves.png · win_rate.png · reward.png</text>
    <text x="280" y="558" fill="#555" font-style="italic">raw + rolling mean overlay</text>

    <text x="640" y="540">videos/*.gif</text>
    <text x="640" y="558" fill="#555" font-style="italic">main vs random (p0 &amp; p1), vs first &amp; latest snapshot</text>

    <text x="80"  y="585">results.json</text>
    <text x="80"  y="600" fill="#555" font-style="italic">win/loss/draw vs random (95% CI) + vs every league snapshot</text>

    <text x="500" y="585">PettingZoo connect_four_v3</text>
    <text x="500" y="600" fill="#555" font-style="italic">mirrors OpenSpiel actions in lockstep purely for rgb_array rendering</text>
  </g>
</svg>
